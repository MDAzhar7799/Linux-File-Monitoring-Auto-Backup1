# ============================================================
# FileGuardian DevOps System — nginx.conf
# Custom nginx configuration for the dashboard
# ============================================================

server {
    listen 80;
    server_name localhost;

    # Root directory for static files
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for faster loads
    gzip on;
    gzip_types text/plain text/css application/javascript text/html;
    gzip_min_length 256;

    # Serve the dashboard
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Cache static assets (CSS, JS)
    location ~* \.(css|js|png|jpg|svg|ico)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Custom error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;

    # Logging
    access_log /var/log/nginx/fileguardian_access.log;
    error_log  /var/log/nginx/fileguardian_error.log warn;
}
